name: CI
on:
  pull_request:
  push:
  
jobs:
  linter:
    runs-on: ubuntu-latest
    steps:
      - uses: styfle/cancel-workflow-action@0.9.1
        with:
          access_token: ${{ secrets.GITHUB_TOKEN  }}
      - uses: actions/checkout@v4
      - name: repo file execution
        run: python3 main.py
